<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meusAI - Welcome Screen</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 Global Build CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#ffffff',         // Crisp clean white canvas
                            panel: '#f8fafc',      // Soft slate background tint
                            accentCyan: '#06b6d4',  // Retained sharp brand cyan
                            accentPurple: '#8b5cf6' // Shifted slightly to a deeper purple for readable text contrast on light backgrounds
                        }
                    },
                    animation: {
                        'text-gradient': 'textShine 4s linear infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: {
                        textShine: {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [v-cloak] {
            display: none;
        }
    </style>



    <style>
        @keyframes floating {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-25px);
            }
        }

        @keyframes shadow-shrink {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.3;
                filter: blur(4px);
            }

            50% {
                transform: scale(0.85);
                opacity: 0.2;
                filter: blur(6px);
            }
        }

        .animate-float-text {
            animation: floating 3s ease-in-out infinite;
        }

        .animate-float-shadow {
            animation: shadow-shrink 3s ease-in-out infinite;
        }
    </style>


</head>

<body
    class="bg-brand-bg text-gray-100 min-h-screen flex items-center justify-center p-4 antialiased overflow-hidden select-none">

    <!-- Vue App Mounting Scope Container -->
    <div id="app" v-cloak class="w-full max-w-sm flex flex-col items-center justify-center text-center px-6 relative">


        <!-- System Entrance Card Component (Triggers Entry Animations Instantly) -->
        <div class="space-y-6 flex flex-col items-center">

            <!-- Core Tech Icon Mesh -->
            <div v-if="name === ''"
                class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-brand-accentPurple to-brand-accentCyan p-[1px] shadow-[0_0_30px_rgba(6,182,212,0.15)] animate-bounce">
                <div class="w-full h-full bg-brand-bg rounded-2xl flex items-center justify-center">
                    <i data-lucide="cpu" class="w-7 h-7 text-brand-accentCyan animate-pulse"></i>
                </div>
            </div>


            <!-- UI Implementation Example -->
            <div class="flex flex-col items-center justify-center p-4">
                <!-- Floating Text Block -->
                <h2
                    class="animate-float-text font-sans text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-accentCyan to-brand-accentPurple z-10">
                    {{ name }}
                </h2>
                <!-- Simulated Perspective Ground Shadow -->
                <div class="animate-float-shadow w-24 h-1 bg-gray-400/40 rounded-full mt-1.5"></div>
            </div>

        </div>

        <!-- MAIN WORKSPACE: HYBRID VOICE & TYPING CONTAINER -->
        <div class="w-full bg-white border border-gray-200/80 rounded-xl p-5 shadow-sm space-y-4">

            <label class="block text-[11px] font-bold uppercase tracking-wider text-gray-400 text-left">
                System Command Interface
            </label>

            <!-- Unified Form Action Wrapper -->
            <form @submit.prevent="submitCommand" class="relative flex items-center">

                <!-- Interactive Multi-Mode Input Field (Accepts Keyboard Typing AND Voice Outputs) -->
                <input type="text" v-model="voiceInputText" @keydown.enter.prevent="submitCommand"
                    placeholder="Type a command or click mic to speak..."
                    class="w-full bg-gray-50/50 border border-gray-200 focus:border-brand-accentPurple focus:bg-white focus:ring-2 focus:ring-brand-accentPurple/10 rounded-lg pl-4 pr-24 py-3 text-sm text-gray-900 placeholder-gray-400 outline-none transition">

                <!-- Right-Aligned Action Control Group Panel -->
                <div class="absolute right-2 flex items-center space-x-1">

                    <!-- Voice Input Action Trigger -->
                    <button type="button" @click="toggleVoiceRecognition"
                        :class="isListening ? 'text-rose-500 bg-rose-50 border-rose-200' : 'text-gray-400 hover:text-brand-accentPurple hover:bg-gray-50 border-transparent'"
                        class="p-2 rounded-md border transition-all duration-200 active:scale-95 flex items-center justify-center focus:outline-none"
                        title="Toggle Voice Input (Malayalam/English)">
                        <div class="relative w-5 h-5 flex items-center justify-center">
                            <!-- Audio Stream Active Visual Indicators -->
                            <span v-if="isListening"
                                class="absolute inline-flex h-full w-full rounded-full bg-rose-400/30 animate-ping"></span>
                            <span v-if="isListening"
                                class="absolute inline-flex h-3 w-3 rounded-full bg-rose-500 animate-pulse"></span>

                            <!-- SVG Microphone Vector -->
                            <svg v-if="!isListening" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                                <line x1="12" x2="12" y1="19" y2="22" />
                            </svg>
                        </div>
                    </button>

                    <!-- Manual Submission Action Trigger -->
                    <button type="submit" :disabled="!voiceInputText.trim()"
                        class="p-2 rounded-md transition-all duration-200 flex items-center justify-center focus:outline-none disabled:opacity-30 disabled:cursor-not-allowed text-brand-accentPurple disabled:text-gray-300"
                        title="Submit Command">
                        <!-- SVG Paper Airplane Submit Vector -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </form>

            <!-- Streaming Audio Processing Telemetry Feedback -->
            <div v-if="isListening"
                class="flex items-center space-x-2 text-xs text-rose-500 font-medium tracking-wide animate-pulse text-left">
                <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>
                <span>Listening... Speak clearly into your device microphone.</span>
            </div>
        </div>

    </div>

    <!-- Application Initialization Script Engine Setup -->
    <script>
        // Instance building pipeline using traditional Vue Options API configuration layout
        Vue.createApp({
            data() {
                return {
                    mountDelayTimer: null,
                    initializedAt: null,
                    name: "ഹലോ ഋഷികേശ്",
                    isComponentActive: true,
                    voiceInputText: '',
                    isListening: false,
                    recognition: null,
                }
            },
            methods: {
                submitCommand() {
                    if (!this.voiceInputText.trim()) return;

                    console.log("Executing query payload:", this.voiceInputText);
                    this.triggerVoiceWelcome(this.voiceInputText);
                    this.voiceInputText = '';

                },
                initializeSpeechEngine() {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

                    if (!SpeechRecognition) {
                        console.warn("Speech recognition not supported on this browser ecosystem.");
                        return;
                    }

                    this.recognition = new SpeechRecognition();
                    this.recognition.continuous = false;
                    this.recognition.interimResults = false;

                    // CHANGED: Force the acoustic model to process Malayalam audio patterns
                    this.recognition.lang = 'ml-IN';

                    this.recognition.onstart = () => {
                        this.isListening = true;
                    };

                    this.recognition.onresult = (event) => {
                        // The text result will be returned written in native Malayalam script (മലയാളം)
                        const textResult = event.results[0][0].transcript;
                        this.voiceInputText = textResult;

                        this.handleVoiceCommandDispatched(textResult);
                    };

                    this.recognition.onerror = (error) => {
                        console.error("Speech engine error:", error.error);
                        this.isListening = false;
                    };

                    this.recognition.onend = () => {
                        this.isListening = false;
                    };
                },
                toggleVoiceRecognition() {
                    // Check if the engine loaded cleanly during mount
                    if (!this.recognition) {
                        // Drop the native alert box and display a clean text message in the box layout instead
                        this.voiceInputText = "⚠️ Speech input unavailable on this browser. Please type manually.";
                        return;
                    }

                    if (this.isListening) {
                        this.recognition.stop();
                    } else {
                        this.voiceInputText = '';
                        try {
                            this.recognition.start();
                        } catch (err) {
                            console.error("Engine failed to start:", err);
                            this.isListening = false;
                        }
                    }
                },
                handleVoiceCommandDispatched(commandText) {
                    console.log("Processing captured voice query string:", commandText);
                    // Put your form submission or AI prompt forwarding actions here!
                },
                triggerVoiceWelcome(text) {
                    if (!('speechSynthesis' in window)) return;

                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);

                    // 1. Get all available voices on the user's terminal system
                    const voices = window.speechSynthesis.getVoices();

                    // 2. Optimized Selection: Prioritize localized Indian Malayalam configurations
                    const malayalamVoice = voices.find(voice =>
                        voice.lang === 'ml-IN' ||
                        voice.lang === 'ml_IN' ||
                        voice.name.toLowerCase().includes('malayalam') ||
                        voice.name.toLowerCase().includes('മലയാളം')
                    );

                    if (malayalamVoice) {
                        utterance.voice = malayalamVoice;
                        utterance.lang = 'ml-IN';
                        console.log(`Successfully mapped voice to native model: ${malayalamVoice.name}`);
                    } else {
                        // Fallback: Default to local English profile if Malayalam is missing from local system hardware
                        console.warn("Malayalam native pack not found on this device. Falling back to English.");
                        utterance.lang = 'en-IN'; // Using Indian-English sounds more natural as an alternative fallback
                    }

                    utterance.rate = 0.80; // Slightly reduced rate makes synthesized regional languages clear
                    window.speechSynthesis.speak(utterance);
                },
                retriggerGreeting() {
                    // Quick confirmation trace statement mapped directly inside option methods
                    console.log("Re-initializing greeting core telemetry.");
                    window.location.reload();
                },
                initIcons() {
                    this.$nextTick(() => {
                        if (window.lucide) {
                            window.lucide.createIcons();
                        }
                    });
                },
                executeDelayedTask() {
                    this.showElements = true;
                    console.value = "Delayed initialization complete.";
                    // Run your automation, animations, or voice triggers here
                },
                delay(ms) {
                    return new Promise(resolve => setTimeout(resolve, ms));
                },
            },
            async mounted() {
                await this.delay(250);
                this.triggerVoiceWelcome(this.name);
                await this.delay(2500);
                if (!this.isComponentActive) return;

                this.name = "?";
                this.triggerVoiceWelcome("പറയിചേട്ടാ ?");
                await this.delay(2500);
                if (!this.isComponentActive) return;
                this.name = "";
            },
            beforeUnmount() {
                this.isComponentActive = false;
                console.log("Component destroyed. Automation sequence halted safely.");
            },
        }).mount('#app');
    </script>
</body>

</html>
