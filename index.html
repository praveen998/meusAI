<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meusAI - Welcome Screen</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 Global Build CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#ffffff',         // Crisp clean white canvas
                            panel: '#f8fafc',      // Soft slate background tint
                            accentCyan: '#06b6d4',  // Retained sharp brand cyan
                            accentPurple: '#8b5cf6' // Shifted slightly to a deeper purple for readable text contrast on light backgrounds
                        }
                    },
                    animation: {
                        'text-gradient': 'textShine 4s linear infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: {
                        textShine: {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [v-cloak] {
            display: none;
        }
    </style>
</head>

<body
    class="bg-brand-bg text-gray-100 min-h-screen flex items-center justify-center p-4 antialiased overflow-hidden select-none">

    <!-- Vue App Mounting Scope Container -->
    <div id="app" v-cloak class="w-full max-w-sm flex flex-col items-center justify-center text-center px-6 relative">



        <!-- System Entrance Card Component (Triggers Entry Animations Instantly) -->
        <div v-if="screen === 'welcome'" class="space-y-6 flex flex-col items-center">

            <!-- Core Tech Icon Mesh -->
            <div
                class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-brand-accentPurple to-brand-accentCyan p-[1px] shadow-[0_0_30px_rgba(6,182,212,0.15)] animate-bounce">
                <div class="w-full h-full bg-brand-bg rounded-2xl flex items-center justify-center">
                    <i data-lucide="cpu" class="w-7 h-7 text-brand-accentCyan animate-pulse"></i>
                </div>
            </div>

            <!-- Animated Header Typography -->
            <div class="space-y-2">

                <!-- Text gradient translation effect -->
                <h1
                    class="text-3xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-brand-accentCyan via-white to-brand-accentPurple animate-text-gradient bg-[length:200%_auto]">
                    Welcome meusAI
                </h1>
            </div>


            <div class="grid grid-cols-2 grid-rows-1 gap-4">

                <button type="button" @click="screen='login'"
                    class="text-white bg-gradient-to-r from-cyan-500 to-blue-500 hover:bg-gradient-to-bl focus:outline-none border rounded-lg font-medium text-sm px-4 py-2.5 text-center leading-5">
                    Login
                </button>
                <button type="button"
                    class="text-white bg-gradient-to-r from-cyan-500 to-blue-500 hover:bg-gradient-to-bl focus:outline-none  border rounded-lg font-medium rounded-base text-sm px-4 py-2.5 text-center leading-5">Sign
                    Up</button>
            </div>
        </div>



        <!-- STATE: POPUP/MODAL BACKGROUND CONTAINER -->
        <div v-if="screen === 'login'"
            class="w-full bg-brand-panel border border-gray-100 rounded-2xl p-6 sm:p-8 shadow-xl shadow-gray-200/50 flex flex-col items-center space-y-6 animate-fade-in">

            <!-- Header Branding Group -->
            <div class="text-center space-y-1 w-full">
                <h2 class="text-xl font-black tracking-tight text-gray-900">
                    Sign into your account
                </h2>
                <p class="text-xs text-gray-400">
                    Join meusAI to initialize automated agent pipelines.
                </p>
            </div>

            <!-- Main Authentication Workspace Wrapper -->
            <div class="w-full bg-white border border-gray-200/80 rounded-xl p-5 sm:p-6 shadow-sm space-y-4">

                <!-- Social OAuth Provider Action Group -->
                <div class="space-y-2">
                    <!-- Google Login Action Button -->
                    <button @click="authenticateOAuth('Google')"
                        class="w-full bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 text-xs font-bold py-2.5 px-4 rounded-lg shadow-sm transition active:scale-[0.99] flex items-center justify-center space-x-3">
                        <!-- SVG Brand Representation Vector for Google -->
                        <svg class="w-4 h-4" viewBox="0 0 24 24" width="100%" height="100%">
                            <path fill="#EA4335"
                                d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115z" />
                            <path fill="#34A853"
                                d="M16.04 15.345c-1.077.736-2.423 1.164-4.04 1.164-2.955 0-5.464-1.991-6.355-4.673L1.58 14.93C3.623 19.045 7.89 21.818 12 21.818c3.155 0 6.045-1.036 8.218-2.827l-4.178-3.646z" />
                            <path fill="#4285F4"
                                d="M23.49 12.273c0-.727-.073-1.445-.19-2.145H12v4.545h6.455a5.57 5.57 0 0 1-2.418 3.646l4.177 3.646c2.446-2.254 3.864-5.582 3.864-9.691z" />
                            <path fill="#FBBC05"
                                d="M5.645 11.836A6.81 6.81 0 0 1 5.264 12c0-.573.064-1.127.182-1.664L1.42 7.22A11.95 11.95 0 0 0 0 12c0 1.745.373 3.4 1.04 4.909l4.605-3.073z" />
                        </svg>
                        <span>Continue with Google</span>
                    </button>


                </div>

                <!-- Structural Divider Element -->
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-100"></div>
                    <span
                        class="flex-shrink mx-3 text-[10px] font-bold uppercase tracking-wider text-gray-400 font-mono">Or
                        use credentials</span>
                    <div class="flex-grow border-t border-gray-100"></div>
                </div>

                <!-- Traditional Email Entry Fields -->
                <form @submit.prevent="handleSignupSubmit" class="space-y-3.5 text-left">
                    <div class="space-y-1">
                        <label for="reg-email"
                            class="block text-[10px] font-bold uppercase tracking-wider text-gray-400">
                            Email Address
                        </label>
                        <input id="reg-email" type="email" v-model="authForm.email" placeholder="operator@network.com"
                            class="w-full bg-gray-50/50 border border-gray-200 focus:border-brand-accentPurple focus:bg-white focus:ring-2 focus:ring-brand-accentPurple/10 rounded-lg px-3 py-2 text-xs text-gray-900 placeholder-gray-400 outline-none transition"
                            required>
                    </div>

                    <div class="space-y-1">
                        <label for="reg-password"
                            class="block text-[10px] font-bold uppercase tracking-wider text-gray-400">
                            Choose Password
                        </label>
                        <input id="reg-password" type="password" v-model="authForm.password"
                            placeholder="Minimum 8 characters"
                            class="w-full bg-gray-50/50 border border-gray-200 focus:border-brand-accentPurple focus:bg-white focus:ring-2 focus:ring-brand-accentPurple/10 rounded-lg px-3 py-2 text-xs text-gray-900 placeholder-gray-400 outline-none transition"
                            required>
                    </div>

                    <!-- Native Form Submission Trigger Button -->
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-brand-accentPurple to-brand-accentCyan hover:opacity-95 active:scale-[0.99] text-white text-xs font-bold py-2.5 px-4 rounded-lg shadow-md transition pt-2">
                        Sign In
                    </button>
                </form>
            </div>

            <!-- Footnote Operational Links Toggle -->
            <div class="w-full flex flex-col items-center space-y-2 pt-1 border-t border-gray-100/60">
                <p class="text-xs text-gray-500">
                    create new account?
                    <button @click="screen = 'signup'"
                        class="font-bold text-brand-accentCyan hover:underline bg-transparent border-none p-0 cursor-pointer transition-colors duration-150">
                        Sign Up
                    </button>
                </p>
                <p class="text-[10px] text-gray-400 text-center max-w-[280px] leading-normal">
                    Need assistance? <a href="./demo.html" class="hover:text-gray-600 underline decoration-gray-300">Contact Node
                        Administrator</a> or view <a href="#"
                        class="hover:text-gray-600 underline decoration-gray-300">System Status</a>.
                </p>
            </div>
        </div>

    </div>

    <!-- Application Initialization Script Engine Setup -->
    <script>
        // Instance building pipeline using traditional Vue Options API configuration layout
        Vue.createApp({
            data() {
                return {
                    initializedAt: null,
                    screen: "welcome",
                    authForm: {
                        email: '',
                        password: ''
                    }
                }
            },
            methods: {

                authenticateOAuth(provider) {
                    console.log(`Redirecting securely to ${provider} OAuth federation node.`);
                    alert(`Connecting authentication link with ${provider}...`);
                },
                handleSignupSubmit() {
                    console.log("Transmitting identity schema keys:", this.authForm);
                    alert(`Account created successfully for: ${this.authForm.email}`);
                },
                retriggerGreeting() {
                    // Quick confirmation trace statement mapped directly inside option methods
                    console.log("Re-initializing greeting core telemetry.");
                    window.location.reload();
                },
                initIcons() {
                    this.$nextTick(() => {
                        if (window.lucide) {
                            window.lucide.createIcons();
                        }
                    });
                }
            },
            mounted() {
                this.initializedAt = new Date();
                this.initIcons();
                console.log("meusAI micro-landing layout initialized.");
            }
        }).mount('#app');
    </script>
</body>

</html>
